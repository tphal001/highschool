<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dr. Gadagkar High School, Satararoad — Home</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['"DM Sans"', "system-ui", "sans-serif"],
              display: ['"Fraunces"', "Georgia", "serif"],
            },
            colors: {
              school: {
                navy: "#0f172a",
                slate: "#1e293b",
                gold: "#d4a853",
                cream: "#faf8f5",
              },
            },
            transitionTimingFunction: {
              premium: "cubic-bezier(0.16, 1, 0.3, 1)",
            },
            transitionDuration: {
              400: "400ms",
              600: "600ms",
              800: "800ms",
            },
            keyframes: {
              "fade-in-up": {
                "0%": { opacity: "0", transform: "translate3d(0, 32px, 0)" },
                "100%": { opacity: "1", transform: "translate3d(0, 0, 0)" },
              },
              "fade-in": {
                "0%": { opacity: "0" },
                "100%": { opacity: "1" },
              },
              "gradient-shift": {
                "0%, 100%": { backgroundPosition: "0% 50%" },
                "50%": { backgroundPosition: "100% 50%" },
              },
            },
            animation: {
              "fade-in-up":
                "fade-in-up 1s cubic-bezier(0.16, 1, 0.3, 1) forwards",
              "fade-in": "fade-in 0.8s ease-out forwards",
              "gradient-shift": "gradient-shift 12s ease-in-out infinite",
            },
          },
        },
      };
    </script>
    <style>
      html {
        scroll-behavior: smooth;
      }
      @media (prefers-reduced-motion: reduce) {
        html {
          scroll-behavior: auto;
        }
      }
      [data-reveal] {
        opacity: 0;
        transform: translate3d(0, 28px, 0);
        transition:
          opacity 0.9s cubic-bezier(0.16, 1, 0.3, 1),
          transform 0.9s cubic-bezier(0.16, 1, 0.3, 1);
      }
      [data-reveal].is-visible {
        opacity: 1;
        transform: translate3d(0, 0, 0);
      }
      @media (prefers-reduced-motion: reduce) {
        [data-reveal] {
          opacity: 1;
          transform: none;
          transition: none;
        }
      }
      site-navbar,
      site-footer,
      announcement-card {
        display: block;
      }
    </style>
    <script src="js/site-config.js"></script>
    <script src="js/content.js"></script>
    <script src="js/components.js"></script>
    <script src="js/render.js"></script>
  </head>
  <body class="bg-school-cream font-sans text-slate-800 antialiased" data-page="home">
    <site-navbar></site-navbar>

    <main>
      <!-- Hero: image + tagline filled from js/content.js -->
      <section
        id="home-hero"
        class="relative min-h-[90vh] overflow-hidden pt-20 sm:min-h-screen sm:pt-24"
        aria-label="Hero"
      ></section>

      <!-- 50+ years highlight -->
      <section class="relative -mt-1 overflow-hidden border-y border-amber-700/30" aria-label="50 year anniversary">
        <div id="home-legacy" class="relative"></div>
      </section>

      <!-- Quick announcements -->
      <section id="announcements" class="scroll-mt-28 px-5 py-24 sm:px-8 sm:py-28 lg:px-10 lg:py-36">
        <div class="mx-auto max-w-7xl">
          <div class="flex flex-col gap-6 sm:flex-row sm:items-end sm:justify-between" data-reveal>
            <div class="max-w-2xl">
              <h2 class="font-display text-3xl font-bold tracking-tight text-school-navy sm:text-4xl lg:text-[2.5rem]">
                Quick announcements
              </h2>
              <p class="mt-4 text-lg leading-relaxed text-slate-600">
                Stay current with campus news and key dates. Edit lists in <code class="rounded bg-slate-100 px-1.5 py-0.5 text-sm">js/content.js</code>.
              </p>
            </div>
            <a
              href="news.html"
              class="shrink-0 text-sm font-semibold text-amber-800 transition duration-300 ease-premium hover:text-amber-950"
            >
              View all news →
            </a>
          </div>
          <ul
            id="home-quick-announcements"
            class="mt-16 grid gap-8 sm:grid-cols-2 lg:grid-cols-3 lg:gap-10"
            role="list"
            data-reveal-stagger
          ></ul>
        </div>
      </section>

      <!-- About preview -->
      <section class="border-t border-slate-200/80 bg-white px-5 py-24 sm:px-8 sm:py-28 lg:px-10 lg:py-36">
        <div class="mx-auto max-w-7xl">
          <div id="home-about-preview"></div>
        </div>
      </section>

      <!-- Alumni spotlight -->
      <section class="border-t border-slate-200/80 bg-school-cream px-5 py-24 sm:px-8 sm:py-28 lg:px-10 lg:py-36">
        <div class="mx-auto max-w-7xl">
          <div id="home-alumni-spotlight"></div>
        </div>
      </section>
    </main>

    <site-footer></site-footer>

    <script src="js/site.js"></script>
  </body>
</html>
