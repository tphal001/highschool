<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Dr. Gadagkar High School, Satararoad — Home</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/tailwind-theme.js"></script>
    <style>
      html {
        scroll-behavior: smooth;
      }
      @media (prefers-reduced-motion: reduce) {
        html {
          scroll-behavior: auto;
        }
      }
      [data-reveal] {
        opacity: 0;
        transform: translate3d(0, 28px, 0);
        transition:
          opacity 0.9s cubic-bezier(0.16, 1, 0.3, 1),
          transform 0.9s cubic-bezier(0.16, 1, 0.3, 1);
      }
      [data-reveal].is-visible {
        opacity: 1;
        transform: translate3d(0, 0, 0);
      }
      @media (prefers-reduced-motion: reduce) {
        [data-reveal] {
          opacity: 1;
          transform: none;
          transition: none;
        }
      }
      site-navbar,
      site-footer,
      announcement-card {
        display: block;
      }
      /**
       * One shared value for block-start + block-end so top/bottom “white strips” match.
       * (Tailwind py-* is symmetric too; this makes the intent explicit and avoids drift.)
       */
      main .home-section-balanced {
        padding-block: clamp(4.5rem, 5.5vw + 2rem, 7rem);
      }
      /* Equal-height announcement cards in the grid */
      #home-quick-announcements {
        align-items: stretch;
      }
      /* Flash / VIMP modal — “movie poster” entrance */
      #vimp-news-modal .vimp-backdrop {
        opacity: 0;
        transition: opacity 0.4s ease;
      }
      #vimp-news-modal.vimp-open .vimp-backdrop {
        opacity: 1;
      }
      #vimp-news-modal .vimp-poster-card {
        transform: scale(0.9) translateY(12px);
        opacity: 0;
        transition:
          transform 0.55s cubic-bezier(0.16, 1, 0.3, 1),
          opacity 0.45s ease;
      }
      #vimp-news-modal.vimp-open .vimp-poster-card {
        transform: scale(1) translateY(0);
        opacity: 1;
      }
      @media (prefers-reduced-motion: reduce) {
        #vimp-news-modal .vimp-poster-card {
          transform: none;
          opacity: 1;
          transition: none;
        }
        #vimp-news-modal .vimp-backdrop {
          opacity: 1;
          transition: none;
        }
      }
    </style>
    <script src="js/site-config.js"></script>
    <script src="js/content.js"></script>
    <script src="js/components.js"></script>
    <script src="js/render.js"></script>
  </head>
  <body class="bg-mes-light font-sans text-slate-800 antialiased" data-page="home">
    <site-navbar></site-navbar>

    <main>
      <!-- Hero (slider + appeal) -->
      <section
        id="home-hero"
        class="border-b border-mes-primary/10 bg-white px-4 pb-8 pt-56 sm:px-8 sm:pb-8 lg:px-10 lg:pb-5"
        aria-label="Welcome"
      ></section>

      <!-- 50+ years highlight -->
      <section class="relative -mt-px overflow-hidden border-y border-mes-nav/20" aria-label="Legacy">
        <div id="home-legacy" class="relative"></div>
      </section>

      <!-- Quick announcements -->
      <section id="announcements" class="home-section-balanced scroll-mt-52 bg-white px-4 sm:px-8 lg:px-10">
        <div class="mx-auto max-w-7xl">
          <div class="flex flex-col gap-6 sm:flex-row sm:items-end sm:justify-between" data-reveal>
            <div class="max-w-2xl">
              <div class="border-b border-slate-200 pb-2">
                <h2
                  class="relative inline-block pb-2 font-display text-3xl font-bold tracking-tight text-mes-primary sm:text-4xl after:absolute after:bottom-0 after:left-0 after:h-[3px] after:w-24 after:bg-mes-red"
                >
                  Quick announcements
                </h2>
              </div>
              <p class="mt-4 text-lg leading-relaxed text-slate-600">
                Stay current with campus news and key dates. Updates are managed in the school content admin.
              </p>
            </div>
            <a
              href="news.html?ctx=events"
              class="shrink-0 text-sm font-semibold text-mes-accent transition hover:underline"
            >
              View all news →
            </a>
          </div>
          <ul
            id="home-quick-announcements"
            class="mt-12 grid gap-6 sm:grid-cols-2 lg:grid-cols-3 lg:gap-8"
            role="list"
            data-reveal-stagger
          ></ul>
        </div>
      </section>

      <!-- About preview -->
      <section class="home-section-balanced border-t border-slate-200 bg-white px-4 sm:px-8 lg:px-10">
        <div class="mx-auto max-w-7xl">
          <div id="home-about-preview"></div>
        </div>
      </section>

      <!-- Alumni spotlight -->
      <section class="home-section-balanced border-t border-mes-primary/10 bg-mes-light px-4 sm:px-8 lg:px-10">
        <div class="mx-auto max-w-7xl">
          <div id="home-alumni-spotlight"></div>
        </div>
      </section>
    </main>

    <site-footer></site-footer>

    <!-- VIMP notice: image + overlay (shown on Home load; see SITE_CONFIG.vimpNews & site.js) -->
    <div
      id="vimp-news-modal"
      class="fixed inset-0 z-[100] hidden items-center justify-center p-4 sm:p-8"
      role="dialog"
      aria-modal="true"
      aria-labelledby="vimp-news-title"
    >
      <div
        class="vimp-backdrop absolute inset-0 bg-gradient-to-b from-slate-950/95 via-slate-900/90 to-black/95 backdrop-blur-md"
        data-vimp-dismiss
        aria-hidden="true"
      ></div>
      <div
        class="relative z-10 flex w-full max-w-4xl items-center justify-center"
        style="perspective: 1200px"
      >
        <div
          id="vimp-poster-card"
          class="vimp-poster-card relative w-full max-h-[min(92vh,900px)] overflow-hidden rounded-2xl bg-gradient-to-br from-slate-800 via-slate-900 to-black p-[3px] shadow-[0_32px_80px_-12px_rgba(0,0,0,0.75),0_0_0_1px_rgba(255,255,255,0.08)] ring-1 ring-white/10 sm:rounded-3xl sm:p-1"
        >
          <div
            class="relative overflow-hidden rounded-[0.9rem] bg-slate-950 sm:rounded-[1.35rem]"
          >
            <button
              type="button"
              class="absolute right-2 top-2 z-20 flex h-10 w-10 items-center justify-center rounded-full border border-white/20 bg-black/55 text-2xl font-light leading-none text-white shadow-lg backdrop-blur-sm transition hover:bg-black/75 sm:right-3 sm:top-3 sm:h-11 sm:w-11"
              data-vimp-dismiss
              aria-label="Close"
            >
              ×
            </button>
            <div
              class="pointer-events-none absolute inset-0 z-10 rounded-[inherit] shadow-[inset_0_0_100px_rgba(0,0,0,0.45)]"
              aria-hidden="true"
            ></div>
            <img
              id="vimp-news-img"
              src=""
              alt=""
              class="relative z-0 block h-auto w-full object-contain object-top"
              width="900"
              height="1200"
              decoding="async"
            />
          </div>
        </div>
      </div>
    </div>
    <p id="vimp-news-title" class="sr-only">Important notice</p>

    <script src="js/site.js"></script>
  </body>
</html>
