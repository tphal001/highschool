<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>About Us — Dr. Gadagkar High School, Satararoad</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,400;0,700;1,400&family=Source+Sans+3:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/tailwind-theme.js"></script>
    <style>
      html {
        scroll-behavior: smooth;
      }
      [data-reveal] {
        opacity: 0;
        transform: translate3d(0, 28px, 0);
        transition: opacity 0.9s cubic-bezier(0.16, 1, 0.3, 1),
          transform 0.9s cubic-bezier(0.16, 1, 0.3, 1);
      }
      [data-reveal].is-visible {
        opacity: 1;
        transform: translate3d(0, 0, 0);
      }
      @media (prefers-reduced-motion: reduce) {
        [data-reveal] {
          opacity: 1;
          transform: none;
          transition: none;
        }
      }
      site-navbar,
      site-footer {
        display: block;
      }
    </style>
    <script src="js/site-config.js"></script>
    <script src="js/content.js"></script>
    <script src="js/components.js"></script>
    <script src="js/render.js"></script>
  </head>
  <body class="bg-mes-light font-sans text-slate-800 antialiased" data-page="about">
    <site-navbar></site-navbar>
    <main class="px-4 pb-24 pt-56 sm:px-8 sm:pt-60 lg:px-10 lg:pt-64">
      <div class="mx-auto max-w-7xl">
        <div class="grid gap-10 lg:grid-cols-12 lg:gap-10 lg:items-start">
          <div class="lg:col-span-8">
            <h1 class="font-display text-4xl font-bold text-mes-primary">About Us</h1>
            <p class="mt-2 text-lg text-slate-600">History since 1976, mission &amp; vision, and leadership</p>
            <div id="page-about" class="mt-10"></div>
          </div>
          <aside
            id="page-sidebar"
            class="lg:col-span-4 lg:sticky lg:top-40 self-start"
            aria-label="Related information and fund appeal"
          ></aside>
        </div>
      </div>
    </main>
    <site-footer></site-footer>
    <script src="js/site.js"></script>
  </body>
</html>
