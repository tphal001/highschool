<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>About Us — Dr. Gadagkar High School, Satararoad</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['"DM Sans"', "system-ui", "sans-serif"],
              display: ['"Fraunces"', "Georgia", "serif"],
            },
            colors: {
              school: {
                navy: "#0f172a",
                slate: "#1e293b",
                gold: "#d4a853",
                cream: "#faf8f5",
              },
            },
            transitionTimingFunction: { premium: "cubic-bezier(0.16, 1, 0.3, 1)" },
            keyframes: {
              "fade-in-up": {
                "0%": { opacity: "0", transform: "translate3d(0, 32px, 0)" },
                "100%": { opacity: "1", transform: "translate3d(0, 0, 0)" },
              },
            },
            animation: {
              "fade-in-up": "fade-in-up 1s cubic-bezier(0.16, 1, 0.3, 1) forwards",
            },
          },
        },
      };
    </script>
    <style>
      html {
        scroll-behavior: smooth;
      }
      [data-reveal] {
        opacity: 0;
        transform: translate3d(0, 28px, 0);
        transition: opacity 0.9s cubic-bezier(0.16, 1, 0.3, 1),
          transform 0.9s cubic-bezier(0.16, 1, 0.3, 1);
      }
      [data-reveal].is-visible {
        opacity: 1;
        transform: translate3d(0, 0, 0);
      }
      @media (prefers-reduced-motion: reduce) {
        [data-reveal] {
          opacity: 1;
          transform: none;
          transition: none;
        }
      }
      site-navbar,
      site-footer {
        display: block;
      }
    </style>
    <script src="js/site-config.js"></script>
    <script src="js/content.js"></script>
    <script src="js/components.js"></script>
    <script src="js/render.js"></script>
  </head>
  <body class="bg-school-cream font-sans text-slate-800 antialiased" data-page="about">
    <site-navbar></site-navbar>
    <main class="px-5 pb-24 pt-28 sm:px-8 lg:px-10">
      <div class="mx-auto max-w-4xl">
        <h1 class="font-display text-4xl font-bold text-school-navy">About Us</h1>
        <p class="mt-2 text-lg text-slate-600">History since 1976, mission &amp; vision, and leadership</p>
        <div id="page-about" class="mt-10"></div>
      </div>
    </main>
    <site-footer></site-footer>
    <script src="js/site.js"></script>
  </body>
</html>
